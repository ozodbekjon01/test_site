<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}O‘quvchi Paneli{% endblock %}</title>

<style>
/* BODY */
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f3f4f6;
    margin: 0;
}

/* HEADER */
header {
    background: #4f46e5;
    color: #fff;
    padding: 20px;
    text-align: center;
}

/* NAVIGATION */
nav {
    background: #6366f1;
    display: flex;
    justify-content: center;
    gap: 15px;
    padding: 12px 0;
}

nav a {
    color: white;
    text-decoration: none;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: 6px;
}

nav a:hover {
    background: #4f46e5;
}

/* CONTAINER */
.container {
    max-width: 1100px;
    margin: 30px auto;
    padding: 0 20px;
}

/* CARD */
.card {
    background: #fff;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    margin-bottom: 25px;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
}

table th, table td {
    padding: 12px;
    border-bottom: 1px solid #ddd;
}

table th {
    background: #6366f1;
    color: #fff;
}

/* BUTTONS */
.button {
    padding: 6px 10px;
    border-radius: 6px;
    text-decoration: none;
    color: #fff;
    font-size: 13px;
}

.start { background: #22c55e; }
.view { background: #3b82f6; }
.delete { background: #ef4444; }

/* ALERTS */
.alert {
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 15px;
}

.success { background: #dcfce7; color: #166534; }
.error { background: #fee2e2; color: #991b1b; }

</style>
</head>
<body>

<header>
    <h1>O‘quvchi Paneli</h1>
</header>

<nav>
    <a href="/student">Dashboard</a>
    <a href="/student/profile">Profil</a>
    <a href="/logout">Chiqish</a>
</nav>

<div class="container">

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

</div>

</body>
</html>
