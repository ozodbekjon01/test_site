{% extends "base.html" %}
{% block content %}

<style>
body {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    font-family: 'Segoe UI', sans-serif;
}

/* Container */
.test-container {
    max-width: 950px;
    margin: 40px auto;
    padding: 30px;
    border-radius: 25px;
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.05);
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
    color: white;
}

/* Title */
.test-container h1 {
    text-align: center;
    font-size: 2.5rem;
    font-weight: 800;
    background: linear-gradient(90deg, #00f5ff, #ff00c8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* Timer */
.timer-box {
    text-align: center;
    margin: 20px 0;
}

#timer {
    font-size: 1.8rem;
    padding: 10px 25px;
    border-radius: 50px;
    background: rgba(0,0,0,0.5);
    box-shadow: 0 0 15px #00f5ff;
}

/* Progress bar */
.progress {
    height: 10px;
    border-radius: 20px;
    background: rgba(255,255,255,0.1);
    margin-bottom: 20px;
}
.progress-bar {
    height: 100%;
    width: 0%;
    border-radius: 20px;
    background: linear-gradient(90deg, #00f5ff, #ff00c8);
    transition: width 0.3s;
}

/* Questions */
.question-block {
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.07);
    transition: 0.3s;
}
.question-block:hover {
    transform: scale(1.02);
    box-shadow: 0 0 20px rgba(0,255,255,0.4);
}

/* Answers */
.question-block label {
    display: block;
    padding: 10px;
    margin-top: 8px;
    border-radius: 10px;
    background: rgba(255,255,255,0.08);
    cursor: pointer;
    transition: 0.3s;
}

.question-block label:hover {
    background: #00f5ff;
    color: black;
}

input[type="radio"] {
    margin-right: 10px;
}

/* Selected */
input[type="radio"]:checked + span {
    font-weight: bold;
}

/* Button */
#submitBtn {
    display: block;
    margin: 30px auto 0;
    padding: 15px 50px;
    font-size: 1.4rem;
    border-radius: 50px;
    border: none;
    background: linear-gradient(90deg, #00f5ff, #ff00c8);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

#submitBtn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 25px #ff00c8;
}

/* Mobile */
@media(max-width:768px){
    .test-container {
        margin: 10px;
        padding: 20px;
    }
}
</style>

<div class="test-container">

    <h1>🔥 {{ test['title'] }} 🔥</h1>

    <!-- TIMER -->
    <div class="timer-box">
        ⏰ <span id="timer"></span>
    </div>

    <!-- PROGRESS -->
    <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <form id="testForm" method="post">

        {% for q in questions %}
        <div class="question-block">
            <p><b>{{ loop.index }}. {{ q.question['title'] }}</b></p>

            {% for a in q.answers %}
            <label>
                <input type="radio"
                       name="question_{{ q.question['id'] }}"
                       value="{{ a['id'] }}"
                       onchange="updateProgress()">
                <span>{{ a['title'] }}</span>
            </label>
            {% endfor %}
        </div>
        {% endfor %}

        <button type="submit" id="submitBtn">🚀 Testni tugatish</button>

    </form>
</div>

<script>
let time = {{ remaining_seconds }};
let timer = document.getElementById("timer");
let form = document.getElementById("testForm");
let progressBar = document.getElementById("progressBar");

let totalQuestions = {{ questions|length }};

// TIMER
let interval = setInterval(() => {
    let m = Math.floor(time / 60);
    let s = time % 60;

    timer.textContent = m + " min " + s + " sek";

    if(time <= 60){
        timer.style.color = "red";
    }

    if(time <= 0){
        clearInterval(interval);
        timer.textContent = "Vaqt tugadi!";
        form.submit();
    }

    time--;
}, 1000);

// PROGRESS
function updateProgress(){
    let answered = document.querySelectorAll("input[type='radio']:checked").length;
    let percent = (answered / totalQuestions) * 100;
    progressBar.style.width = percent + "%";
}
</script>

{% endblock %}
