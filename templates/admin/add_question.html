<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Savol qo‘shish</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* FORM */
.form-box {
    background: #fff;
    padding: 30px;
    border-radius: 16px;
    width: 480px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
    margin-bottom: 5px;
}

.subtitle {
    text-align: center;
    font-size: 13px;
    color: #666;
    margin-bottom: 20px;
}

/* INPUT */
.input-group {
    margin-bottom: 15px;
}

textarea {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    height: 90px;
    resize: none;
}

textarea:focus {
    border-color: #6366f1;
    outline: none;
    box-shadow: 0 0 0 2px rgba(99,102,241,0.2);
}

/* ANSWERS */
.answers {
    margin-top: 10px;
}

.answer-card {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #f9fafb;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #eee;
    margin-bottom: 10px;
    transition: 0.2s;
}

.answer-card:hover {
    border-color: #6366f1;
}

.answer-card input[type="text"] {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

.answer-card input[type="radio"] {
    transform: scale(1.2);
    cursor: pointer;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: #4f46e5;
    color: #fff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 15px;
    margin-top: 10px;
}

button:hover {
    background: #4338ca;
}

/* ALERT */
.alert {
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 10px;
}

.success { background: #dcfce7; color: #166534; }
.error { background: #fee2e2; color: #991b1b; }

/* LABEL */
.label {
    font-size: 13px;
    color: #555;
    margin-bottom: 5px;
}
</style>
</head>
<body>

<div class="form-box">

<h2>Yangi savol</h2>
<div class="subtitle">Test: <b>{{ test.title }}</b></div>

{% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
        <div class="alert {{ category }}">{{ message }}</div>
    {% endfor %}
{% endwith %}

<form method="POST">

    <!-- SAVOL -->
    <div class="input-group">
        <div class="label">Savol matni</div>
        <textarea name="title" placeholder="Savolni yozing..." required></textarea>
    </div>

    <!-- JAVOBLAR -->
    <div class="input-group">
        <div class="label">To‘g‘ri javobni belgilang</div>

        <div class="answers">

            {% for i in range(1,5) %}
            <div class="answer-card">
                <input type="radio" name="correct" value="{{ i }}" required>
                <input type="text" name="answer{{ i }}" placeholder="Javob {{ i }}" required>
            </div>
            {% endfor %}

        </div>
    </div>

    <button>Saqlash</button>

</form>

</div>

</body>
</html>
