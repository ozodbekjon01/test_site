<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test qo‘shish</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #4f46e5, #9333ea);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* FORM */
.form-box {
    background: #fff;
    padding: 30px;
    border-radius: 14px;
    width: 400px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* INPUT */
.input-group {
    margin-bottom: 15px;
}

.input-group label {
    font-size: 14px;
    display: block;
    margin-bottom: 5px;
}

.input-group input,
.input-group textarea {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

textarea {
    resize: none;
    height: 80px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: #4f46e5;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #4338ca;
}

/* ALERT */
.alert {
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 10px;
}

.success { background: #dcfce7; color: #166534; }
.error { background: #fee2e2; color: #991b1b; }

.back {
    display: block;
    text-align: center;
    margin-top: 10px;
    color: #4f46e5;
    text-decoration: none;
}
</style>
</head>
<body>

<div class="form-box">

    <h2>Test qo‘shish</h2>

    <!-- Flash -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="alert {{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}

    <form method="POST">

        <div class="input-group">
            <label>Nomi</label>
            <input type="text" name="title" required>
        </div>

        <div class="input-group">
            <label>Tavsif</label>
            <textarea name="description" required></textarea>
        </div>

        <div class="input-group">
            <label>Davomiylik (minut)</label>
            <input type="number" name="duration" required>
        </div>

        <div class="input-group">
            <label>Sinf (masalan: 5, 6, 7...)</label>
            <input type="number" name="test_class" min="1" max="11" required>
        </div>

        <div class="input-group">
            <label>Boshlanish vaqti</label>
            <input type="datetime-local" name="start_time" required>
        </div>

        <div class="input-group">
            <label>Tugash vaqti</label>
            <input type="datetime-local" name="end_time" required>
        </div>

        <button>Saqlash</button>

    </form>

    <a href="/admin" class="back">⬅️ Orqaga</a>

</div>

</body>
</html>
